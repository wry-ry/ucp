name: Docs Build and Deploy

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main
      - 'release/**'
    paths:
      - ".github/workflows/docs.yml"
      - "requirements-docs.txt"
      - "mkdocs.yml"
      - "mkdocs-spec.yml"
      - "main.py"
      - "hooks.py"
      - "docs/**"
      - "source/**"

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      pages: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git Credentials
        run: |
          git config --global user.name github-actions[bot]
          git config --global user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libz-dev

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7

      - name: Install documentation dependencies
        run: uv sync

      - name: Lint YAML files
        run: uv run yamllint -c .github/linters/.yamllint.yml .

      - name: Check for changed files in source
        id: source_files_changed
        uses: tj-actions/changed-files@v46
        with:
          files: source/**

      - name: Check for changed files (Spec)
        id: spec_files_changed
        uses: tj-actions/changed-files@v46
        with:
          files: |
            docs/specification/**
            source/**
            hooks.py
            main.py
            mkdocs-spec.yml

      - name: Check for changed files (Root)
        id: root_files_changed
        uses: tj-actions/changed-files@v46
        with:
          files: |
            docs/**
            !docs/specification/**
            hooks.py
            main.py
            mkdocs.yml

      - name: Install ucp-schema for runtime resolution
        run: |
          cargo install ucp-schema
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Lint source schemas
        if: steps.source_files_changed.outputs.any_changed == 'true'
        run: ucp-schema lint source/

      - name: Create folders for JSON publishing
        run: |
          mkdir -p site/schemas
          mkdir -p site/services
          mkdir -p site/handlers
          mkdir -p site/discovery

      - name: Configure Site URL
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch the Pages URL. Fails safely if not enabled.
          PAGES_URL=$(gh api "repos/${{ github.repository }}/pages" --jq '.html_url' 2>/dev/null || true)

          if [ -z "$PAGES_URL" ]; then
            echo "Pages URL not detected. Falling back to default structure."
            PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          fi

          # Ensure trailing slash
          if [[ "$PAGES_URL" != */ ]]; then
            PAGES_URL="${PAGES_URL}/"
          fi

          echo "Set SITE_URL to $PAGES_URL"
          echo "SITE_URL=$PAGES_URL" >> $GITHUB_ENV

      - name: Build Documentation (PR Check - Root)
        if: github.event_name == 'pull_request' && github.base_ref == 'main' && steps.root_files_changed.outputs.any_changed == 'true'
        run: uv run mkdocs build --strict -f mkdocs.yml

      - name: Build Documentation (PR Check - Spec)
        if: github.event_name == 'pull_request' && (startsWith(github.base_ref, 'release/') || steps.spec_files_changed.outputs.any_changed == 'true')
        run: uv run mkdocs build --strict -f mkdocs-spec.yml

      - name: Deploy spec version (draft) from main branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.spec_files_changed.outputs.any_changed == 'true'
        run: uv run mike deploy --config-file mkdocs-spec.yml --push draft

      - name: Deploy root site from main branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.root_files_changed.outputs.any_changed == 'true'
        run: |
          # 1. Build Root Site
          uv run mkdocs build -f mkdocs.yml

          # 2. Deploy Root Site to gh-pages root
          # Fetch and checkout gh-pages
          git fetch origin gh-pages
          git checkout gh-pages

          # Copy build artifacts to root
          cp -r site/* .
          rm -rf site

          # Commit and push
          git add .
          git commit -m "Deploy root site from main" --allow-empty
          git push origin gh-pages

      - name: Deploy release version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/')
        run: |
          # Extract the date (e.g., release/2026-01-11 -> 2026-01-11)
          VERSION_NAME=${GITHUB_REF#refs/heads/release/}

          # Get all remote release branches, extract dates, and find the latest one
          LATEST_VERSION=$(git branch -r | grep "origin/release/[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}" | sed 's/ *origin\/release\///' | sort -r | head -n 1)

          if [ "$VERSION_NAME" = "$LATEST_VERSION" ]; then
            echo "Deploying $VERSION_NAME and updating 'latest' alias"
            uv run mike deploy --config-file mkdocs-spec.yml --push --update-aliases $VERSION_NAME latest
          else
            echo "Deploying $VERSION_NAME without updating 'latest' alias (Latest is $LATEST_VERSION)"
            uv run mike deploy --config-file mkdocs-spec.yml --push $VERSION_NAME
          fi

      - name: Create GitHub Release and Tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION_DATE=${GITHUB_REF#refs/heads/release/}
          TAG_NAME="v$VERSION_DATE"

          # Create Release (This implicitly creates the git tag)
          # The '|| true' ensures the workflow doesn't fail if you
          # push updates to this branch later (re-running the build).
          gh release create "$TAG_NAME" \
            --title "Release $TAG_NAME" \
            --generate-notes \
            --target "$GITHUB_REF_NAME" \
            || echo "Release $TAG_NAME already exists, skipping creation."